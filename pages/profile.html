<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link rel="shortcut icon"
        type="image/x-icon"
        href="/images/logo.jpeg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="/styles/style.css">

</head>

<body class="bg-light">

    <!-- HEADER -->
    <header class="navbar navbar-expand bg-white border-bottom px-3 py-2 sticky-top">

        <div class="container-fluid d-flex justify-content-between align-items-center">

            <!-- LOGO -->
            <div class="logo">

                <img
                    src="/images/logo.jpeg"
                    width="50"
                    height="50"
                    class="rounded"
                    alt="Logo"
                >

            </div>

            <!-- MENU -->
            <div class="position-relative">

                <div
                    class="menu cursor-pointer"
                    id="menuBtn"
                    onclick="toggleMenu()">

                    <!-- MENU ICON -->
                    <svg id="menu"
                        xmlns="http://www.w3.org/2000/svg"
                        height="28px"
                        viewBox="0 -960 960 960"
                        width="28px"
                        fill="#000000">

                        <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
                    </svg>

                    <!-- CLOSE ICON -->
                    <svg id="close-menu"
                        xmlns="http://www.w3.org/2000/svg"
                        height="28px"
                        viewBox="0 -960 960 960"
                        width="28px"
                        fill="#000000"
                        style="display:none;">

                        <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/>
                    </svg>

                </div>

                <!-- DROPDOWN -->
                <div
                    class="dropdown-menu dropdown-menu-end position-absolute shadow-sm p-2 end-0 mt-2 flex-column gap-2"
                    id="dropdownMenu"
                    style="width:160px;">

                    <button
                        id="darkModeToggle"
                        class="btn btn-primary btn-sm w-100"
                        onclick="toggleDarkMode()">

                        Dark Mode
                    </button>

                    <button
                        id="logoutBtn"
                        onclick="logout()"
                        class="btn btn-secondary btn-sm w-100">

                        Logout
                    </button>

                    <!-- LOGOUT MODAL -->
                    <div id="logoutModal" class="logout-modal">
                        <div class="logout-box">
                            <!-- TITLE -->
                            <h2 class="logout-title fs-4">Do you want to log out?</h2>

                            <!-- TEXT -->
                            <p class="logout-text">Your current session will end.</p>

                            <!-- BUTTONS -->
                            <div class="logout-buttons">

                                <!-- YES -->
                                <button class="logout-yes" onclick="confirmLogout()"> Yes</button>

                                <!-- NO -->
                                <button class="logout-no" onclick="closeLogoutModal()">No</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="container-fluid profile-page mx-auto p-3"
        style="max-width:600px; padding-bottom:110px !important;">

        <!-- COVER -->
        <section class="profile-cover position-relative w-100 overflow-hidden bg-black border border-primary border-2 mb-3"
            style="height:260px;">

            <!-- COVER IMAGE -->
            <img
                id="coverImage"
                class="w-100 h-100 object-fit-cover d-block"
                alt="Cover"
            >

            <!-- EDIT -->
            <button
                class="edit-cover position-absolute top-0 end-0 m-3 d-flex align-items-center justify-content-center bg-white border-0 rounded-circle shadow-sm"
                style="width:48px; height:48px; z-index:5;"
                onclick="openEditProfile()">

                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">
                    <path d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"/>
                </svg>

            </button>

            <!-- OVERLAY -->
            <div
                class="cover-overlay position-absolute top-0 start-0 w-100 h-100"
                style="background:linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.15)); z-index:2;">
            </div>

            <!-- PROFILE INFO -->
            <div
                class="profile-info position-absolute bottom-0 start-0 end-0 m-3 d-flex align-items-center gap-3"
                style="z-index:5;">

                <!-- PROFILE IMAGE -->
                <div class="profile-avatar border border-3 border-white rounded-circle overflow-hidden flex-shrink-0"
                    style="width:90px; height:90px;">

                    <img
                        id="profileAvatar"
                        src="/assets/images/profile.jpg"
                        class="w-100 h-100 object-fit-cover"
                        alt="Profile Picture"
                    >

                </div>

                <!-- TEXT -->
                <div class="profile-text text-white">

                    <h3 class="fw-bold mb-1"
                        id="profileFullName">
                    </h3>

                    <p class="small mb-1 text-white-50">

                        <span id="profileEmail"></span>

                        ·

                        <span id="profileContact"></span>

                    </p>

                    <span
                        class="small text-white-50"
                        id="profileBio">

                        Hey wassup guys

                    </span>

                </div>

            </div>

        </section>

        <!-- BUTTONS -->
        <div class="d-flex gap-3 my-3">

            <button class="btn btn-dark flex-fill py-2 fw-semibold">

                My Posts

            </button>

            <button class="btn btn-outline-dark bg-white flex-fill py-2 fw-semibold">

                Photos

            </button>

        </div>

        <!-- SAMPLE POST -->
        <!-- USER POSTS -->
        <div
            class="profile-posts"
            id="profilePosts">
        </div>
        <!-- MODAL -->
        <div class="modal fade"
            id="editProfileModal"
            tabindex="-1">

            <div class="modal-dialog modal-dialog-centered">

                <div class="modal-content rounded-4">

                    <!-- HEADER -->
                    <div class="modal-header">

                        <h5 class="modal-title">

                            Edit Profile

                        </h5>

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                        </button>

                    </div>

                    <!-- BODY -->
                    <div class="modal-body">

                        <!-- PROFILE -->
                        <label class="form-label">

                            Profile Picture

                        </label>

                        <input
                            type="file"
                            id="profileInput"
                            class="form-control mb-3"
                            accept="image/*"
                        >

                        <!-- COVER -->
                        <label class="form-label">

                            Cover Picture

                        </label>

                        <input
                            type="file"
                            id="coverInput"
                            class="form-control mb-3"
                            accept="image/*"
                        >

                        <!-- BIO -->
                        <label class="form-label">

                            Bio

                        </label>

                        <textarea
                            id="bioInput"
                            class="form-control"
                            rows="3">
                        </textarea>

                    </div>

                    <!-- FOOTER -->
                    <div class="modal-footer">

                        <button
                            class="btn btn-dark"
                            onclick="saveProfileChanges()">

                            Save Changes

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <!-- NAV -->
    <nav class="mobile-nav fixed-bottom mx-auto mb-3 bg-white bg-opacity-75 border d-flex align-items-center justify-content-around shadow rounded-pill"
        style="width:92%; max-width:420px; height:68px; backdrop-filter:blur(20px);">

        <!-- HOME -->
        <button
            class="btn border-0 p-2"
            onclick="showPage('home')">

            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">
                <path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/>
            </svg>

        </button>

        <!-- SEARCH -->
        <button
            class="btn border-0 p-2"
            onclick="showPage('search')">

            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">
                <path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
            </svg>

        </button>

        <!-- PROFILE -->
        <button
            class="btn border-0 p-0"
            onclick="showPage('profile')">

            <img
                id="navProfileAvatar"
                class="rounded-circle object-fit-cover"
                style="width:42px; height:42px;"
            >

        </button>

    </nav>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SCRIPT -->
    <script>
        // PARAMS
        const params =
            new URLSearchParams(window.location.search);

        const username =
            params.get('username') || "User";

        // DEFAULT IMAGE
        const defaultProfile =
            "/assets/images/profile.jpg";

        // PROFILE POSTS CONTAINER
        const profilePosts =
            document.getElementById('profilePosts');

        // FETCH USER
        fetch(`/profile-data?username=${username}`)

        .then(response => response.json())

        .then(user => {

            document.getElementById('profileFullName').textContent =
                user.fullName;

            document.getElementById('profileEmail').textContent =
                user.email;

            document.getElementById('profileContact').textContent =
                user.contact_no;

        })

        .catch(error => {

            console.log(error);

        });

        // LOAD USER POSTS
        function loadUserPosts() {

            // GET POSTS
            const allPosts =
                JSON.parse(
                    localStorage.getItem('app_feed_posts')
                ) || [];

            // FILTER USER POSTS
            const userPosts =
                allPosts.filter(
                    post => post.author === username
                );

            // SORT POSTS
            userPosts.sort(
                (a, b) =>
                new Date(b.timestamp)
                -
                new Date(a.timestamp)
            );

            // CLEAR POSTS
            profilePosts.innerHTML = '';

            // NO POSTS
            if(userPosts.length === 0) {

                profilePosts.innerHTML = `

                    <div class="text-center text-muted mt-4">

                        No posts yet

                    </div>
                `;

                return;
            }

            // LOOP POSTS
            userPosts.forEach(post => {

                const savedProfile =
                    localStorage.getItem(
                        `profileImage_${username}`
                    ) || defaultProfile;

                const postElement =
                    document.createElement('article');

                postElement.className =
                    'card border-0 shadow-sm p-3 mb-3 bg-white rounded-3';

                postElement.innerHTML = `

                    <!-- TOP -->
                    <div class="d-flex align-items-center gap-2 mb-2">

                        <div
                            class="rounded-circle overflow-hidden flex-shrink-0"
                            style="width:42px; height:42px;">

                            <img
                                src="${savedProfile}"
                                class="w-100 h-100 object-fit-cover"
                            >

                        </div>

                        <div>

                            <div class="fw-bold small">

                                ${post.author}

                            </div>

                            <div
                                class="text-muted"
                                style="font-size:11px;">

                                ${new Date(post.timestamp).toLocaleString()}

                            </div>

                        </div>

                    </div>

                    <!-- POST TEXT -->
                    <div class="mb-3 text-dark fs-6">

                        ${post.content}

                    </div>

                    <!-- POST IMAGE -->
                    ${post.image ?

                    `
                    <img
                        src="${post.image}"
                        class="img-fluid rounded-3 mb-3"
                    >
                    `

                    : ''}

                    <!-- ACTIONS -->
                    <div class="d-flex justify-content-around border-top pt-2">

                        <button
                            class="btn btn-link btn-sm text-decoration-none text-secondary fw-semibold">

                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">
                                <path d="m480-120-58-52q-101-91-167-157T150-447.5Q111-500 95.5-544T80-634q0-94 63-157t157-63q52 0 99 22t81 62q34-40 81-62t99-22q94 0 157 63t63 157q0 46-15.5 90T810-447.5Q771-395 705-329T538-172l-58 52Zm0-108q96-86 158-147.5t98-107q36-45.5 50-81t14-70.5q0-60-40-100t-100-40q-47 0-87 26.5T518-680h-76q-15-41-55-67.5T300-774q-60 0-100 40t-40 100q0 35 14 70.5t50 81q36 45.5 98 107T480-228Zm0-273Z"/>
                            </svg>

                        </button>

                    </div>
                `;

                profilePosts.appendChild(postElement);
            });
        }

        // MENU
        function toggleMenu() {

            const menuIcon =
                document.getElementById('menu');

            const closeMenuIcon =
                document.getElementById('close-menu');

            const dropdownMenu =
                document.getElementById('dropdownMenu');

            const isActive =
                dropdownMenu.classList.contains('active');

            if(!isActive) {

                dropdownMenu.classList.add('active');

                dropdownMenu.style.display = 'flex';

                menuIcon.style.display = 'none';

                closeMenuIcon.style.display = 'block';

            } else {

                dropdownMenu.classList.remove('active');

                dropdownMenu.style.display = 'none';

                closeMenuIcon.style.display = 'none';

                menuIcon.style.display = 'block';
            }
        }

        // DARK MODE
        function toggleDarkMode() {

            document.body.classList.toggle('bg-dark');

            document.body.classList.toggle('text-white');
        }

        // NAVIGATION
        // NAVIGATION
        function showPage(pageName) {

            if(pageName === 'home') {

                window.location.href =
                    `/home?username=${username}`;
            }

            if(pageName === 'profile') {

                window.location.href =
                    `/profile?username=${username}`;
            }

            if(pageName === 'search') {

                window.location.href =
                    `/home?username=${username}`;
            }
        }

        // OPEN EDIT MODAL
        function openEditProfile() {

            const modal =
                new bootstrap.Modal(
                    document.getElementById(
                        'editProfileModal'
                    )
                );

            modal.show();
        }

        // LOGOUT
        function logout() {

            document.getElementById('logoutModal').style.display =
                'flex';
        }

        // CLOSE MODAL
        function closeLogoutModal() {

            document.getElementById('logoutModal').style.display =
                'none';
        }

        // CONFIRM LOGOUT
        function confirmLogout() {

            window.location.href =
                '/login';
        }

        // OPEN MODAL
        // OPEN EDIT MODAL
        function openEditProfile() {

            const modal =
                new bootstrap.Modal(
                    document.getElementById(
                        'editProfileModal'
                    )
                );

            modal.show();
        }

        // SAVE PROFILE
        function saveProfileChanges() {

            // BIO
            const bio =
                document.getElementById('bioInput').value;

            if(bio.trim() !== '') {

                document.getElementById('profileBio').textContent =
                    bio;

                localStorage.setItem(
                    `bio_${username}`,
                    bio
                );
            }

            // PROFILE IMAGE
            const profileFile =
                document.getElementById('profileInput').files[0];

            if(profileFile) {

                const reader =
                    new FileReader();

                reader.onload =
                    function(e) {

                    document.getElementById('profileAvatar').src =
                        e.target.result;

                    document.getElementById('navProfileAvatar').src =
                        e.target.result;

                    localStorage.setItem(
                        `profileImage_${username}`,
                        e.target.result
                    );
                };

                reader.readAsDataURL(profileFile);
            }

            // COVER IMAGE
            const coverFile =
                document.getElementById('coverInput').files[0];

            if(coverFile) {

                const reader =
                    new FileReader();

                reader.onload =
                    function(e) {

                    document.getElementById('coverImage').src =
                        e.target.result;

                    localStorage.setItem(
                        `coverImage_${username}`,
                        e.target.result
                    );
                };

                reader.readAsDataURL(coverFile);
            }

            // CLOSE MODAL
            bootstrap.Modal.getInstance(
                document.getElementById('editProfileModal')
            ).hide();
        }

        // LOAD SAVED DATA
        window.addEventListener(
            'DOMContentLoaded',
            () => {

                const savedBio =
                    localStorage.getItem(
                        `bio_${username}`
                    );

                const savedProfile =
                    localStorage.getItem(
                        `profileImage_${username}`
                    );

                const savedCover =
                    localStorage.getItem(
                        `coverImage_${username}`
                    );

                // BIO
                if(savedBio) {

                    document.getElementById('profileBio').textContent =
                        savedBio;
                }

                // PROFILE IMAGE
                if(savedProfile) {

                    document.getElementById('profileAvatar').src =
                        savedProfile;

                    document.getElementById('navProfileAvatar').src =
                        savedProfile;

                } else {

                    document.getElementById('profileAvatar').src =
                        defaultProfile;

                    document.getElementById('navProfileAvatar').src =
                        defaultProfile;
                }

                // COVER IMAGE
                const coverImage =
                    document.getElementById('coverImage');

                if(savedCover) {

                    coverImage.src =
                        savedCover;

                    coverImage.style.display =
                        'block';

                } else {

                    coverImage.style.display =
                        'none';
                }

                // LOAD POSTS
                loadUserPosts();

            }
        );
    </script>
</body>
</html>
