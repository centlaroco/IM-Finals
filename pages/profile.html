<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="shortcut icon" type="image/x-icon" href="/images/logo.jpeg">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/style.css">
    <style>

    </style>
</head>

<body class="bg-light">

    <!-- HEADER -->
    <header class="navbar navbar-expand bg-white border-bottom px-3 py-2 sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <!-- LOGO -->
            <div class="logo">
                <img src="/images/logo.jpeg" width="50" height="50" class="rounded" alt="Logo">
            </div>

            <!-- MENU CONTAINER -->
            <div class="position-relative">
                <div class="menu cursor-pointer" id="menuBtn" onclick="toggleMenu()">
                    <!-- MENU ICON -->
                    <svg id="menu" xmlns="http://www.w3.org/2000/svg" height="28px" viewBox="0 -960 960 960" width="28px" fill="#000000">
                        <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
                    </svg>
                    <!-- CLOSE ICON -->
                    <svg id="close-menu" xmlns="http://www.w3.org/2000/svg" height="28px" viewBox="0 -960 960 960" width="28px" fill="#000000" style="display:none;">
                        <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/>
                    </svg>
                </div>

                <!-- DROPDOWN MENU -->
                <div class="dropdown-menu dropdown-menu-end position-absolute shadow-sm p-2 end-0 mt-2 flex-column gap-2" id="dropdownMenu" style="width:170px; display: none;">
                    <button id="darkModeToggle" class="btn btn-primary btn-sm w-100" onclick="toggleDarkMode()">
                        Dark Mode
                    </button>
                    <button class="btn btn-warning btn-sm w-100" onclick="openChangePasswordModal()">
                        Change Password
                    </button>
                    <button class="btn btn-danger btn-sm w-100" onclick="openDeleteAccountModal()">
                        Delete Account
                    </button>
                    <button id="logoutBtn" onclick="logout()" class="btn btn-secondary btn-sm w-100">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN PROFILE CONTENT -->
    <main class="container-fluid profile-page mx-auto p-3" style="max-width:600px; padding-bottom:110px !important;">
        
        <!-- COVER IMAGE CONTAINER -->
        <section class="profile-cover position-relative w-100 overflow-hidden bg-black border border-primary border-2 mb-3" style="height:260px;">
            <img id="coverImage" class="w-100 h-100 object-fit-cover d-block" alt="Cover">

            <!-- EDIT PROFILE BUTTON -->
            <button class="edit-cover position-absolute top-0 end-0 m-3 d-flex align-items-center justify-content-center bg-white border-0 rounded-circle shadow-sm" style="width:48px; height:48px; z-index:5;" onclick="openEditProfile()">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">
                    <path d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"/>
                </svg>
            </button>

            <div class="cover-overlay position-absolute top-0 start-0 w-100 h-100" style="background:linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.15)); z-index:2;"></div>

            <div class="profile-info position-absolute bottom-0 start-0 end-0 m-3 d-flex align-items-center gap-3" style="z-index:5;">
                <div class="profile-avatar border border-3 border-white rounded-circle overflow-hidden flex-shrink-0" style="width:90px; height:90px;">
                    <img id="profileAvatar" src="/assets/images/profile.jpg" class="w-100 h-100 object-fit-cover" alt="Profile Picture">
                </div>
                <div class="profile-text text-white">
                    <h3 class="fw-bold mb-1" id="profileFullName"></h3>
                    <p class="small mb-1 text-white-50">
                        <span id="profileEmail"></span> · <span id="profileContact"></span>
                    </p>
                    <p class="small mb-0 text-white-50" id="profileBio"></p>
                </div>
            </div>
        </section>

        <!-- USER FEED POSTS -->
        <div class="profile-posts" id="profilePosts"></div>

        <!-- EDIT PROFILE -->
        <div class="modal fade" id="editProfileModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content rounded-4">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Profile</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <label class="form-label">Profile Picture</label>
                        <input type="file" id="profileInput" class="form-control mb-3" accept="image/*">

                        <label class="form-label">Cover Picture</label>
                        <input type="file" id="coverInput" class="form-control mb-3" accept="image/*">

                        <label class="form-label">Bio</label>
                        <textarea id="bioInput" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-dark" onclick="saveProfileChanges()">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- CHANGE PASSWORD -->
        <div class="modal fade" id="changePasswordModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered m-3">
                <div class="modal-content rounded-4">
                    <div class="modal-header">
                        <h5 class="modal-title">Change Password</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" id="newPasswordInput" class="form-control" placeholder="Enter new password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" id="confirmPasswordInput" class="form-control" placeholder="Confirm new password">
                        </div>
                        <div id="passwordError" class="text-danger small d-none"></div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-warning" onclick="submitPasswordChange()">Update Password</button>
                    </div>
                </div>
            </div>
        </div>

        <!--LOGOUT CONFIRMATION -->
        <div class="modal fade" id="logoutModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered modal-sm m-3">
                <div class="modal-content rounded-4">
                    <div class="modal-header border-0">
                        <h5 class="modal-title fw-bold">Logout?</h5>
                    </div>
                    <div class="modal-body py-0 text-muted">
                        Are you sure you want to log out of your session?
                    </div>
                    <div class="modal-footer border-0 d-flex gap-2">
                        <button type="button" class="btn btn-light flex-fill" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-danger flex-fill" onclick="confirmLogout()">Logout</button>
                    </div>
                </div>
            </div>
        </div>

        <!--DELETE ACCOUNT WITH PASSWORD CHECK -->
        <div class="modal fade" id="deleteAccountModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content rounded-4">
                    <div class="modal-header">
                        <h5 class="modal-title text-danger fw-bold">Delete Account</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p class="text-muted small">Warning: This action is permanent and cannot be undone. All data will be destroyed.</p>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Enter your password to verify identification:</label>
                            <input type="password" id="deleteAccountPassword" class="form-control" placeholder="Enter password">
                        </div>
                        <div id="deleteAccountError" class="text-danger small d-none"></div>
                    </div>
                    <div class="modal-footer border-0 d-flex gap-2">
                        <button type="button" class="btn btn-light flex-fill" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-danger flex-fill" onclick="submitDeleteAccount()">Permanently Delete</button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- NAVIGATION -->
    <nav class="mobile-nav fixed-bottom mx-auto mb-3 bg-white bg-opacity-75 border d-flex align-items-center justify-content-around shadow rounded-pill">

        <!-- HOME -->
        <button
            class="rounded-circle border-0 bg-transparent d-flex justify-content-center align-items-center"
            style="width:48px; height:48px;"
            onclick="showPage('home')">

            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">
                <path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/>
            </svg>

        </button>

        <!-- SEARCH -->
        <button
            class="rounded-circle border-0 bg-transparent d-flex justify-content-center align-items-center"
            style="width:48px; height:48px;"
            onclick="showPage('search')">

            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">
                <path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
            </svg>

        </button>

        <!-- PROFILE -->
        <button
            class="rounded-circle border-0 bg-transparent d-flex justify-content-center align-items-center"
            style="width:48px; height:48px;"
            onclick="goToProfile()">

            <img
                id="navProfileAvatar"
                class="rounded-circle object-fit-cover"
                style="width:42px; height:42px;"
            >

        </button>

    </nav>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- APPLICATION SCRIPTS -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const username = params.get('username') || "User";
        const defaultProfile = "/assets/images/profile.jpg";
        const profilePosts = document.getElementById('profilePosts');

        
        async function loadUserPosts() {
            try {
                const response = await fetch('/posts');
                const allPosts = await response.json();

                // FILTER POSTS BY USERNAME
                const userPosts = allPosts.filter(
                    post => post.username === username
                );

                // SORT NEWEST FIRST
                userPosts.sort(
                    (a, b) => b.id - a.id
                );

                profilePosts.innerHTML = '';

                // NO POSTS
                if(userPosts.length === 0) {

                    profilePosts.innerHTML = `
                        <div class="text-center text-muted mt-4">
                            No posts yet
                        </div>
                    `;
                    return;
                }

                // RENDER POSTS
                userPosts.forEach(post => {

                    const savedProfile = post.profile_pic || defaultProfile;
                    const postElement = document.createElement('article');

                    postElement.className =
                        'card border-0 shadow-sm p-3 mb-3 bg-white rounded-3';

                    postElement.innerHTML = `

                    <div class="d-flex justify-content-between align-items-start mb-2">

                        <div class="d-flex align-items-center gap-2">

                            <div class="rounded-circle overflow-hidden flex-shrink-0"
                                style="width:42px; height:42px;">

                                <img src="${savedProfile}"
                                    class="w-100 h-100 object-fit-cover">
                            </div>

                            <div>

                                <div class="fw-bold small">
                                    ${post.username}
                                </div>

                                <div class="text-muted"
                                    style="font-size:11px;">

                                    ${new Date(post.created_at || Date.now()).toLocaleString()}
                                </div>

                            </div>

                        </div>

                        <!-- DELETE BUTTON -->
                        <div class="position-relative">
                            <button
                                class="btn border-0 bg-transparent p-0"
                                onclick="toggleDeleteBox('${post.id}')">

                                <svg xmlns="http://www.w3.org/2000/svg"
                                    height="24px"
                                    viewBox="0 -960 960 960"
                                    width="24px"
                                    fill="#000000">

                                    <path d="M240-400q-33 0-56.5-23.5T160-480q0-33 23.5-56.5T240-560q33 0 56.5 23.5T320-480q0 33-23.5 56.5T240-400Zm240 0q-33 0-56.5-23.5T400-480q0-33 23.5-56.5T480-560q33 0 56.5 23.5T560-480q0 33-23.5 56.5T480-400Zm240 0q-33 0-56.5-23.5T640-480q0-33 23.5-56.5T720-560q33 0 56.5 23.5T800-480q0 33-23.5 56.5T720-400Z"/>
                                </svg>

                            </button>

                            <!-- DELETE CONFIRM BOX -->
                            <div id="deleteBox_${post.id}"
                                class="delete-box d-none">

                                <p class="mb-2 small">
                                    Do you want to delete this post?
                                </p>

                                <div class="d-flex gap-2">

                                    <button
                                        class="btn btn-danger btn-sm w-100"
                                        onclick="deletePost('${post.id}')">

                                        Delete
                                    </button>

                                    <button
                                        class="btn btn-secondary btn-sm w-100"
                                        onclick="closeDeleteBox('${post.id}')">

                                        Cancel
                                    </button>

                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="mb-3 text-dark fs-6">
                        ${post.content || ''}
                    </div>

                    ${post.image ? `
                        <img src="${post.image}"
                            class="img-fluid rounded-3 mb-3">
                    ` : ''}
                `;
                profilePosts.appendChild(postElement);
            });
            } catch(error) {
                console.log(error);
                profilePosts.innerHTML = `
                    <div class="text-danger text-center mt-4">
                        Failed to load posts
                    </div>
                `;
            }
        }

        function toggleMenu() {
            const menuIcon = document.getElementById('menu');
            const closeMenuIcon = document.getElementById('close-menu');
            const dropdownMenu = document.getElementById('dropdownMenu');
            const isActive = dropdownMenu.classList.contains('active');

            if(!isActive) {
                dropdownMenu.classList.add('active');
                dropdownMenu.style.display = 'flex';
                menuIcon.style.display = 'none';
                closeMenuIcon.style.display = 'block';
            } else {
                dropdownMenu.classList.remove('active');
                dropdownMenu.style.display = 'none';
                closeMenuIcon.style.display = 'none';
                menuIcon.style.display = 'block';
            }
        }

        function toggleDeleteBox(postId) {

            const box =
                document.getElementById(`deleteBox_${postId}`);

            box.classList.toggle('d-none');
        }

        function closeDeleteBox(postId) {

            const box =
                document.getElementById(`deleteBox_${postId}`);

            box.classList.add('d-none');
        }

        // DELETE POST
        async function deletePost(postId) {

            try {

                const response = await fetch('/delete-post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        id: postId,
                        username: username
                    })
                });

                const result = await response.json();

                if(result.error) {
                    alert(result.error);
                    return;
                }

                // RELOAD POSTS
                loadUserPosts();

            } catch(error) {

                console.log(error);

                alert("Failed to delete post");
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('bg-dark');
            document.body.classList.toggle('text-white');
        }

        document.addEventListener('click', function(event) {
            const menuContainer = document.querySelector('.position-relative');
            const dropdownMenu = document.getElementById('dropdownMenu');
            if (!menuContainer.contains(event.target) && dropdownMenu.classList.contains('active')) {
                toggleMenu();
            }
        });

        function showPage(pageName) {
            if(pageName === 'home') {
                window.location.href = `/home?username=${username}`;
            } else if(pageName === 'profile') {
                window.location.href = `/profile?username=${username}`;
            } else if(pageName === 'search') {
                window.location.href = `/search?username=${username}`;
            }
        }

        function openEditProfile() {
            const currentBio = document.getElementById('profileBio').textContent;
            document.getElementById('bioInput').value = currentBio.trim();
            
            const modal = new bootstrap.Modal(document.getElementById('editProfileModal'));
            modal.show();
        }

        function handleNavHideOnScroll() {
            let lastScrollTop = 0;
            const nav = document.querySelector('.mobile-nav');

            window.addEventListener('scroll', () => {

                let currentScroll =
                    window.pageYOffset || document.documentElement.scrollTop;

                if (currentScroll > lastScrollTop) {

                    // scrolling down → hide nav
                    nav.classList.add('hide');

                } else {

                    // scrolling up → show nav
                    nav.classList.remove('hide');
                }

                lastScrollTop =
                    currentScroll <= 0 ? 0 : currentScroll;
            });
        }

        document.addEventListener(
            'DOMContentLoaded',
            handleNavHideOnScroll
        );
        
        // LOGOUT FUNCTION
        function logout() {
            toggleMenu(); 
            const exitModal = new bootstrap.Modal(document.getElementById('logoutModal'));
            exitModal.show();
        }

        function confirmLogout() {
            window.location.href = '/login';
        }

        // ADDED: Opens Delete Account Modal
        function openDeleteAccountModal() {
            toggleMenu();
            document.getElementById('deleteAccountPassword').value = '';
            document.getElementById('deleteAccountError').classList.add('d-none');
            const delModal = new bootstrap.Modal(document.getElementById('deleteAccountModal'));
            delModal.show();
        }

        // ADDED: Handles Delete Account Submission and Password Check
        function submitDeleteAccount() {
            const password = document.getElementById('deleteAccountPassword').value;
            const errorDiv = document.getElementById('deleteAccountError');
            errorDiv.classList.add('d-none');

            if (!password) {
                errorDiv.textContent = "Password verification field is required.";
                errorDiv.classList.remove('d-none');
                return;
            }

            // Calls your backend route to handle matching security checks and removal logic
            fetch('/delete-account', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Clear user local configurations safely 
                    localStorage.removeItem(`bio_${username}`);
                    localStorage.removeItem(`profileImage_${username}`);
                    localStorage.removeItem(`coverImage_${username}`);
                    
                    alert("Your account has been deleted successfully.");
                    window.location.href = '/login';
                } else {
                    errorDiv.textContent = data.error || "Incorrect password.";
                    errorDiv.classList.remove('d-none');
                }
            })
            .catch(error => {
                console.error("Error deleting account:", error);
                errorDiv.textContent = "Server error. Try again later.";
                errorDiv.classList.remove('d-none');
            });
        }

        async function saveProfileChanges() {
            const bio = document.getElementById('bioInput').value;
            const profileFile = document.getElementById('profileInput').files[0];
            const coverFile = document.getElementById('coverInput').files[0];

            let profileBase64 = null;
            let coverBase64 = null;

            // CONVERT PROFILE IMAGE
            if(profileFile) {
                profileBase64 = await convertToBase64(profileFile);
            }

            // CONVERT COVER IMAGE
            if(coverFile) {
                coverBase64 = await convertToBase64(coverFile);
            }

            try {
                const response =
                    await fetch('/update-profile', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: username,
                            bio: bio,
                            profile_pic: profileBase64,
                            cover_pic: coverBase64
                        })
                    });

                const result = await response.json();

                if(result.error) {
                    alert(result.error);
                    return;
                }

                alert("Profile updated!");

                loadProfileData();

                bootstrap.Modal
                    .getInstance(
                        document.getElementById('editProfileModal')
                    )
                    .hide();

            } catch(error) {
                console.log(error);
                alert("Failed to update profile");
            }
        }

        function openEditProfile() {
            const bioElement = document.getElementById('profileBio');
            // Use a fallback string if the element or text doesn't exist yet
            const currentBio = bioElement ? bioElement.textContent : ''; 
            document.getElementById('bioInput').value = currentBio.trim();
            
            const modal = new bootstrap.Modal(document.getElementById('editProfileModal'));
            modal.show();
        }

        //coverts image file to base 64 string for easier storage
        function convertToBase64(file) {

            return new Promise((resolve, reject) => {

                const reader = new FileReader();

                reader.readAsDataURL(file);

                reader.onload = () => resolve(reader.result);

                reader.onerror = error => reject(error);
            });
        }

        async function loadProfileData() {
            try {
                const response = await fetch(`/profile-data?username=${username}`);
                const user = await response.json();

                document.getElementById('profileFullName').textContent =
                    user.fullName || username;
                document.getElementById('profileEmail').textContent =
                    user.email || 'No email shared';
                document.getElementById('profileContact').textContent =
                    user.contact_no || 'No contact config';
                document.getElementById('profileBio').textContent =
                    user.bio || 'No bio yet';

                // PROFILE PIC
                document.getElementById('profileAvatar').src =
                    user.profile_pic || defaultProfile;
                document.getElementById('navProfileAvatar').src =
                    user.profile_pic || defaultProfile;

                // COVER PIC
                const coverImage =
                    document.getElementById('coverImage');

                if(user.cover_pic) {

                    coverImage.src = user.cover_pic;

                    coverImage.style.display = 'block';

                } else {

                    coverImage.style.display = 'none';
                }

            } catch(error) {

                console.log(error);
            }
        }

        function openChangePasswordModal() {
            toggleMenu(); 
            const passModal = new bootstrap.Modal(document.getElementById('changePasswordModal'));
            passModal.show();
        }

        function submitPasswordChange() {
            const newPassword = document.getElementById('newPasswordInput').value;
            const confirmPassword = document.getElementById('confirmPasswordInput').value;
            const errorDiv = document.getElementById('passwordError');

            errorDiv.classList.add('d-none');

            if (!newPassword || !confirmPassword) {
                errorDiv.textContent = "All fields are required.";
                errorDiv.classList.remove('d-none');
                return;
            }

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = "Passwords do not match.";
                errorDiv.classList.remove('d-none');
                return;
            }

            fetch('/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: newPassword })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert("Password updated successfully!");
                    bootstrap.Modal.getInstance(document.getElementById('changePasswordModal')).hide();
                    document.getElementById('newPasswordInput').value = '';
                    document.getElementById('confirmPasswordInput').value = '';
                } else {
                    errorDiv.textContent = data.error || "An error occurred.";
                    errorDiv.classList.remove('d-none');
                }
            })
            .catch(error => {
                console.error("Error:", error);
                errorDiv.textContent = "Server error. Try again later.";
                errorDiv.classList.remove('d-none');
            });
        }

        window.addEventListener('DOMContentLoaded', () => {

            loadProfileData();

            loadUserPosts();
        });
    </script>
</body>
</html>
