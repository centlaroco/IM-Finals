<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link rel="shortcut icon"
        type="image/x-icon"
        href="/images/logo.jpeg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="/styles/style.css">

</head>

<body class="bg-light">

    <!-- HEADER -->
    <header class="navbar navbar-expand bg-white border-bottom px-3 py-2 sticky-top">

        <div class="container-fluid d-flex justify-content-between align-items-center">

            <!-- LOGO -->
            <div class="logo">

                <img
                    src="/images/logo.jpeg"
                    width="50"
                    height="50"
                    class="rounded"
                    alt="Logo"
                >

            </div>

            <!-- MENU -->
            <div class="position-relative">

                <div
                    class="menu cursor-pointer"
                    id="menuBtn"
                    onclick="toggleMenu()">

                    <!-- MENU ICON -->
                    <svg id="menu"
                        xmlns="http://www.w3.org/2000/svg"
                        height="28px"
                        viewBox="0 -960 960 960"
                        width="28px"
                        fill="#000000">

                        <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
                    </svg>

                    <!-- CLOSE ICON -->
                    <svg id="close-menu"
                        xmlns="http://www.w3.org/2000/svg"
                        height="28px"
                        viewBox="0 -960 960 960"
                        width="28px"
                        fill="#000000"
                        style="display:none;">

                        <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/>
                    </svg>

                </div>

                <!-- DROPDOWN -->
                <div
                    class="dropdown-menu dropdown-menu-end position-absolute shadow-sm p-2 end-0 mt-2 flex-column gap-2"
                    id="dropdownMenu"
                    style="width:160px;">

                    <button
                        id="darkModeToggle"
                        class="btn btn-primary btn-sm w-100"
                        onclick="toggleDarkMode()">

                        Dark Mode
                    </button>

                    <button
                        id="logoutBtn"
                        onclick="logout()"
                        class="btn btn-secondary btn-sm w-100">

                        Logout
                    </button>

                    <!-- LOGOUT MODAL -->
                    <div id="logoutModal" class="logout-modal">
                        <div class="logout-box">
                            <!-- TITLE -->
                            <h2 class="logout-title">Do you want to log out?</h2>

                            <!-- TEXT -->
                            <p class="logout-text">Your current session will end.</p>

                            <!-- BUTTONS -->
                            <div class="logout-buttons">

                                <!-- YES -->
                                <button class="logout-yes" onclick="confirmLogout()"> Yes</button>

                                <!-- NO -->
                                <button class="logout-no" onclick="closeLogoutModal()">No</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="container-fluid profile-page mx-auto p-3"
        style="max-width:600px; padding-bottom:110px !important;">

        <!-- COVER -->
        <section class="profile-cover position-relative w-100 overflow-hidden bg-black border border-primary border-2 mb-3"
            style="height:260px;">

            <!-- COVER IMAGE -->
            <img
                id="coverImage"
                class="w-100 h-100 object-fit-cover d-block"
                alt="Cover"
            >

            <!-- EDIT -->
            <button
                class="edit-cover position-absolute top-0 end-0 m-3 d-flex align-items-center justify-content-center bg-white border-0 rounded-circle shadow-sm"
                style="width:48px; height:48px; z-index:5;"
                onclick="openEditProfile()">

                ✎

            </button>

            <!-- OVERLAY -->
            <div
                class="cover-overlay position-absolute top-0 start-0 w-100 h-100"
                style="background:linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.15)); z-index:2;">
            </div>

            <!-- PROFILE INFO -->
            <div
                class="profile-info position-absolute bottom-0 start-0 end-0 m-3 d-flex align-items-center gap-3"
                style="z-index:5;">

                <!-- PROFILE IMAGE -->
                <div class="profile-avatar border border-3 border-white rounded-circle overflow-hidden flex-shrink-0"
                    style="width:90px; height:90px;">

                    <img
                        id="profileAvatar"
                        src="/assets/images/profile.jpg"
                        class="w-100 h-100 object-fit-cover"
                        alt="Profile Picture"
                    >

                </div>

                <!-- TEXT -->
                <div class="profile-text text-white">

                    <h3 class="fw-bold mb-1"
                        id="profileFullName">
                    </h3>

                    <p class="small mb-1 text-white-50">

                        <span id="profileEmail"></span>

                        ·

                        <span id="profileContact"></span>

                    </p>

                    <span
                        class="small text-white-50"
                        id="profileBio">

                        Hey wassup guys

                    </span>

                </div>

            </div>

        </section>

        <!-- BUTTONS -->
        <div class="d-flex gap-3 my-3">

            <button class="btn btn-dark flex-fill py-2 fw-semibold">

                My Posts

            </button>

            <button class="btn btn-outline-dark bg-white flex-fill py-2 fw-semibold">

                Photos

            </button>

        </div>

        <!-- SAMPLE POST -->
        <div class="profile-posts">

            <article class="card border-0 shadow-sm p-3 mb-3 bg-white rounded-3">

                <div class="d-flex align-items-center gap-2 mb-2">

                    <div class="rounded-circle overflow-hidden flex-shrink-0"
                        style="width:42px; height:42px;">

                        <img
                            id="samplePostAvatar"
                            src="/assets/images/profile.jpg"
                            class="w-100 h-100 object-fit-cover"
                        >

                    </div>

                    <div>

                        <div class="fw-bold small">

                            Vince24

                        </div>

                        <div class="text-muted extra-small"
                            style="font-size:11px;">

                            Just now

                        </div>

                    </div>

                </div>

                <div class="mb-3 text-dark fs-6">

                    Hi, There

                </div>

                <div class="d-flex justify-content-around border-top pt-2">

                    <button class="btn btn-link btn-sm text-decoration-none text-secondary fw-semibold">

                        💛 Like

                    </button>

                    <button class="btn btn-link btn-sm text-decoration-none text-secondary fw-semibold">

                        💬 Comment

                    </button>

                </div>

            </article>

        </div>

        <!-- MODAL -->
        <div class="modal fade"
            id="editProfileModal"
            tabindex="-1">

            <div class="modal-dialog modal-dialog-centered">

                <div class="modal-content rounded-4">

                    <!-- HEADER -->
                    <div class="modal-header">

                        <h5 class="modal-title">

                            Edit Profile

                        </h5>

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                        </button>

                    </div>

                    <!-- BODY -->
                    <div class="modal-body">

                        <!-- PROFILE -->
                        <label class="form-label">

                            Profile Picture

                        </label>

                        <input
                            type="file"
                            id="profileInput"
                            class="form-control mb-3"
                            accept="image/*"
                        >

                        <!-- COVER -->
                        <label class="form-label">

                            Cover Picture

                        </label>

                        <input
                            type="file"
                            id="coverInput"
                            class="form-control mb-3"
                            accept="image/*"
                        >

                        <!-- BIO -->
                        <label class="form-label">

                            Bio

                        </label>

                        <textarea
                            id="bioInput"
                            class="form-control"
                            rows="3">
                        </textarea>

                    </div>

                    <!-- FOOTER -->
                    <div class="modal-footer">

                        <button
                            class="btn btn-dark"
                            onclick="saveProfileChanges()">

                            Save Changes

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <!-- NAV -->
    <nav class="mobile-nav fixed-bottom mx-auto mb-3 bg-white bg-opacity-75 border d-flex align-items-center justify-content-around shadow rounded-pill"
        style="width:92%; max-width:420px; height:68px; backdrop-filter:blur(20px);">

        <!-- HOME -->
        <button
            class="btn border-0 p-2"
            onclick="showPage('home')">

            🏠

        </button>

        <!-- SEARCH -->
        <button
            class="btn border-0 p-2"
            onclick="showPage('search')">

            🔍

        </button>

        <!-- PROFILE -->
        <button
            class="btn border-0 p-0"
            onclick="showPage('profile')">

            <img
                id="navProfileAvatar"
                class="rounded-circle object-fit-cover"
                style="width:42px; height:42px;"
            >

        </button>

    </nav>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SCRIPT -->
    <script>

        // PARAMS
        const params =
            new URLSearchParams(window.location.search);

        const username =
            params.get('username') || "User";

        // DEFAULT IMAGE
        const defaultProfile =
            "/assets/images/profile.jpg";

        // FETCH USER
        fetch(`/profile-data?username=${username}`)

        .then(response => response.json())

        .then(user => {

            document.getElementById('profileFullName').textContent =
                user.fullName;

            document.getElementById('profileEmail').textContent =
                user.email;

            document.getElementById('profileContact').textContent =
                user.contact_no;

        })

        .catch(error => {

            console.log(error);

        });

        // MENU
        function toggleMenu() {

            const menuIcon =
                document.getElementById('menu');

            const closeMenuIcon =
                document.getElementById('close-menu');

            const dropdownMenu =
                document.getElementById('dropdownMenu');

            const isActive =
                dropdownMenu.classList.contains('active');

            if(!isActive) {

                dropdownMenu.classList.add('active');

                dropdownMenu.style.display = 'flex';

                menuIcon.style.display = 'none';

                closeMenuIcon.style.display = 'block';

            } else {

                dropdownMenu.classList.remove('active');

                dropdownMenu.style.display = 'none';

                closeMenuIcon.style.display = 'none';

                menuIcon.style.display = 'block';
            }
        }

        // DARK MODE
        function toggleDarkMode() {

            document.body.classList.toggle('bg-dark');

            document.body.classList.toggle('text-white');
        }

        // NAVIGATION
        function showPage(pageName) {

            if(pageName === 'home') {

                window.location.href =
                    `/home?username=${username}`;
            }

            if(pageName === 'profile') {

                window.location.href =
                    `/profile?username=${username}`;
            }

            if(pageName === 'search') {

                window.location.href =
                    `/home?username=${username}`;
            }
        }

        // LOGOUT
        function logout() {

            document.getElementById('logoutModal').style.display =
                'flex';
        }

        // CLOSE MODAL
        function closeLogoutModal() {

            document.getElementById('logoutModal').style.display =
                'none';
        }

        // CONFIRM LOGOUT
        function confirmLogout() {

            window.location.href =
                '/login';
        }

        // OPEN MODAL
        function openEditProfile() {

            const modal =
                new bootstrap.Modal(
                    document.getElementById('editProfileModal')
                );

            modal.show();
        }

        // SAVE PROFILE
        function saveProfileChanges() {

            // BIO
            const bio =
                document.getElementById('bioInput').value;

            if(bio.trim() !== '') {

                document.getElementById('profileBio').textContent =
                    bio;

                localStorage.setItem(
                    `bio_${username}`,
                    bio
                );
            }

            // PROFILE IMAGE
            const profileFile =
                document.getElementById('profileInput').files[0];

            if(profileFile) {

                const reader =
                    new FileReader();

                reader.onload =
                    function(e) {

                    // MAIN PROFILE
                    document.getElementById('profileAvatar').src =
                        e.target.result;

                    // NAV PROFILE
                    document.getElementById('navProfileAvatar').src =
                        e.target.result;

                    // SAMPLE POST
                    document.getElementById('samplePostAvatar').src =
                        e.target.result;

                    // SAVE
                    localStorage.setItem(
                        `profileImage_${username}`,
                        e.target.result
                    );
                };

                reader.readAsDataURL(profileFile);
            }

            // COVER IMAGE
            const coverFile =
                document.getElementById('coverInput').files[0];

            if(coverFile) {

                const reader =
                    new FileReader();

                reader.onload =
                    function(e) {

                    document.getElementById('coverImage').src =
                        e.target.result;

                    localStorage.setItem(
                        `coverImage_${username}`,
                        e.target.result
                    );
                };

                reader.readAsDataURL(coverFile);
            }

            // CLOSE MODAL
            bootstrap.Modal.getInstance(
                document.getElementById('editProfileModal')
            ).hide();
        }

        // LOAD SAVED DATA
        window.addEventListener(
            'DOMContentLoaded',
            () => {

                const savedBio =
                    localStorage.getItem(
                        `bio_${username}`
                    );

                const savedProfile =
                    localStorage.getItem(
                        `profileImage_${username}`
                    );

                const savedCover =
                    localStorage.getItem(
                        `coverImage_${username}`
                    );

                // BIO
                if(savedBio) {

                    document.getElementById('profileBio').textContent =
                        savedBio;
                }

                // PROFILE IMAGE
                if(savedProfile) {

                    document.getElementById('profileAvatar').src =
                        savedProfile;

                    document.getElementById('navProfileAvatar').src =
                        savedProfile;

                    document.getElementById('samplePostAvatar').src =
                        savedProfile;

                } else {

                    document.getElementById('profileAvatar').src =
                        defaultProfile;

                    document.getElementById('navProfileAvatar').src =
                        defaultProfile;

                    document.getElementById('samplePostAvatar').src =
                        defaultProfile;
                }

                // COVER
                const coverImage =
                    document.getElementById('coverImage');

                if(savedCover) {

                    // SHOW SAVED COVER
                    coverImage.src =
                        savedCover;

                    coverImage.style.display =
                        'block';

                } else {

                    // NO COVER IMAGE
                    // HIDE IMAGE AND USE BLACK BACKGROUND
                    coverImage.style.display =
                        'none';
                }
            }
        );

    </script>

</body>
</html>
