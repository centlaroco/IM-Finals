<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Cache-Control"
        content="no-cache, no-store, must-revalidate">

    <meta http-equiv="Pragma"
        content="no-cache">

    <meta http-equiv="Expires"
        content="0">

    <title>Home</title>

    <link rel="shortcut icon"
        type="image/x-icon"
        href="/images/logo.jpeg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="/styles/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="w-100 d-flex justify-content-between align-items-center px-3 sticky-top">

        <!-- LOGO -->
        <div class="logo">

            <img
                src="/images/logo.jpeg"
                width="50"
                height="50"
                alt="Logo"
                class="rounded-3"
            >

        </div>

        <!-- MENU -->
        <div class="menu position-relative"
            style="cursor:pointer;">

            <!-- OPEN -->
            <svg id="menu"
                xmlns="http://www.w3.org/2000/svg"
                height="28px"
                viewBox="0 -960 960 960"
                width="28px">

                <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
            </svg>

            <!-- CLOSE -->
            <svg id="close-menu"
                class="d-none"
                xmlns="http://www.w3.org/2000/svg"
                height="28px"
                viewBox="0 -960 960 960"
                width="28px">

                <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/>
            </svg>

        </div>

        <!-- DROPDOWN -->
        <div
            class="dropdown-menu custom-dropdown flex-column gap-2 p-2 rounded-3 shadow-lg"
            id="dropdownMenu">

            <button
                id="darkModeToggle"
                class="btn btn-primary w-100 btn-sm"
                onclick="toggleDarkMode()">

                Dark Mode
            </button>

            <button
                id="logoutBtn"
                onclick="logout()"
                class="btn btn-secondary w-100 btn-sm">

                Logout
            </button>

        </div>

    </header>

    <!-- MAIN -->
    <main
        class="container px-3 pt-3 pb-5"
        style="max-width:600px;"
        id="homePage">

        <!-- COMPOSER -->
        <div class="composer rounded-4 p-3 mb-3 shadow-sm">

            <div class="composer-top d-flex align-items-center gap-2">

                <!-- AVATAR -->
                <img
                    id="homeProfileAvatar"
                    class="rounded-circle object-fit-cover"
                    style="width:42px; height:42px;"
                >

                <!-- TEXTAREA -->
                <textarea
                    id="postInput"
                    class="form-control rounded-pill border-0 px-3 py-2 fs-6">
                </textarea>

            </div>

            <!-- IMAGE INPUT -->
            <input
                type="file"
                id="mediaInput"
                accept="image/*"
                class="d-none"
            >

            <!-- PREVIEW -->
            <div id="imagePreview"
                class="image-preview w-100">
            </div>

            <!-- ACTIONS -->
            <div class="composer-actions d-flex justify-content-between align-items-center mt-3">

                <!-- UPLOAD -->
                <button
                    class="btn btn-link text-decoration-none text-dark p-0 d-flex align-items-center gap-1 upload-btn shadow-none"
                    type="button"
                    onclick="document.getElementById('mediaInput').click()">

                    📷
                    <span class="fs-6 fw-semibold">
                        Upload
                    </span>

                </button>

                <!-- POST -->
                <button
                    class="btn btn-dark rounded-pill px-4 fw-semibold post-btn"
                    onclick="addNewPost()">

                    Post
                </button>

            </div>

        </div>

        <!-- POSTS -->
        <div id="posts"
            class="w-100">
        </div>

    </main>

    <!-- NAVIGATION -->
    <nav class="mobile-nav rounded-pill shadow d-flex justify-content-around align-items-center">

        <!-- HOME -->
        <button
            class="rounded-circle border-0 bg-transparent d-flex justify-content-center align-items-center"
            style="width:48px; height:48px;"
            onclick="showPage('home')">

            🏠

        </button>

        <!-- SEARCH -->
        <button
            class="rounded-circle border-0 bg-transparent d-flex justify-content-center align-items-center"
            style="width:48px; height:48px;"
            onclick="showPage('search')">

            🔍

        </button>

        <!-- PROFILE -->
        <button
            class="rounded-circle border-0 bg-transparent d-flex justify-content-center align-items-center"
            style="width:48px; height:48px;"
            onclick="goToProfile()">

            <img
                id="navProfileAvatar"
                class="rounded-circle object-fit-cover"
                style="width:42px; height:42px;"
            >

        </button>

    </nav>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SCRIPT -->
    <script>

        // POSTS CONTAINER
        const postsContainer =
            document.getElementById('posts');

        // INPUT
        const postInput =
            document.getElementById('postInput');

        // IMAGE INPUT
        const mediaInput =
            document.getElementById('mediaInput');

        // PREVIEW
        const preview =
            document.getElementById('imagePreview');

        // SELECTED IMAGE
        let selectedImage = null;

        // USERNAME
        const params =
            new URLSearchParams(window.location.search);

        const username =
            params.get('username') || "User";

        // DEFAULT IMAGE
        const defaultProfile =
            "/assets/images/profile.jpg";

        // SAVED PROFILE IMAGE
        const savedProfileImage =
            localStorage.getItem(`profileImage_${username}`);

        // HOME AVATAR
        const homeAvatar =
            document.getElementById('homeProfileAvatar');

        homeAvatar.src =
            savedProfileImage || defaultProfile;

        // NAV AVATAR
        const navAvatar =
            document.getElementById('navProfileAvatar');

        navAvatar.src =
            savedProfileImage || defaultProfile;

        // PLACEHOLDER
        postInput.placeholder =
            username !== "User"
            ? `Nag unsa ka, ${username}?`
            : "Nag unsa ka?";

        // POSTS STORAGE
        let savedPostsArray =
            JSON.parse(
                localStorage.getItem('app_feed_posts')
            ) || [];

        // LOAD POSTS
        document.addEventListener(
            "DOMContentLoaded",
            () => {

                renderAllSavedPosts();
            }
        );

        // TIME FORMAT
        function formatTimestamp(timestamp) {

            const now = new Date();

            const diffInSeconds =
                Math.floor(
                    (now - new Date(timestamp)) / 1000
                );

            if(diffInSeconds < 60)
                return 'just now';

            const diffInMinutes =
                Math.floor(diffInSeconds / 60);

            if(diffInMinutes < 60)
                return `${diffInMinutes}m`;

            const diffInHours =
                Math.floor(diffInMinutes / 60);

            if(diffInHours < 24)
                return `${diffInHours}h`;

            const diffInDays =
                Math.floor(diffInHours / 24);

            return `${diffInDays}d`;
        }

        // RENDER POSTS
        function renderAllSavedPosts() {

            postsContainer.innerHTML = '';

            // SORT POSTS
            savedPostsArray.sort(
                (a, b) =>
                new Date(b.timestamp)
                -
                new Date(a.timestamp)
            );

            // LOOP POSTS
            savedPostsArray.forEach(postData => {

                // PROFILE IMAGE
                const currentProfileImage =
                    localStorage.getItem(
                        `profileImage_${postData.author}`
                    ) || defaultProfile;

                // CREATE POST
                const postElement =
                    document.createElement('div');

                postElement.className =
                    'post rounded-4 p-3 mb-3 shadow-sm border-0';

                // POST HTML
                postElement.innerHTML = `

                    <!-- POST TOP -->
                    <div class="post-top d-flex align-items-start justify-content-between mb-2">

                        <!-- LEFT -->
                        <div class="d-flex align-items-center gap-2">

                            <!-- PROFILE -->
                            <img
                                src="${currentProfileImage}"
                                class="rounded-circle object-fit-cover"
                                style="width:42px; height:42px;"
                            >

                            <!-- USER -->
                            <div class="post-user">

                                <!-- NAME -->
                                <div class="username fw-semibold fs-6">

                                    ${postData.author}

                                </div>

                                <!-- TIME -->
                                <div
                                    class="time small text-muted post-time"
                                    data-timestamp="${postData.timestamp}">

                                    ${formatTimestamp(postData.timestamp)}

                                </div>

                            </div>

                        </div>

                        <!-- DELETE BUTTON -->
                        <button
                            class="btn border-0 bg-transparent p-0"
                            onclick="deletePost('${postData.id}')">

                            <svg xmlns="http://www.w3.org/2000/svg"
                                height="24px"
                                viewBox="0 -960 960 960"
                                width="24px"
                                fill="#000000">

                                <path d="M240-400q-33 0-56.5-23.5T160-480q0-33 23.5-56.5T240-560q33 0 56.5 23.5T320-480q0 33-23.5 56.5T240-400Zm240 0q-33 0-56.5-23.5T400-480q0-33 23.5-56.5T480-560q33 0 56.5 23.5T560-480q0 33-23.5 56.5T480-400Zm240 0q-33 0-56.5-23.5T640-480q0-33 23.5-56.5T720-560q33 0 56.5 23.5T800-480q0 33-23.5 56.5T720-400Z"/>
                            </svg>

                        </button>

                    </div>

                    <!-- POST TEXT -->
                    <div
                        class="post-text mb-2 fs-6 text-break"
                        style="line-height:1.6; color:#111;">

                        ${postData.content}

                    </div>

                    <!-- IMAGE -->
                    ${postData.image ?

                    `
                    <img
                        src="${postData.image}"
                        class="img-fluid rounded-3 mb-2 w-100 object-fit-cover"
                        style="max-height:300px;"
                    >
                    `

                    : ''}

                    <!-- ACTIONS -->
                    <div class="post-actions d-flex justify-content-around border-top pt-2 mt-2">

                        <!-- LIKE -->
                        <button
                            class="btn btn-link text-decoration-none text-secondary">

                            ❤️ Like

                        </button>

                        <!-- COMMENT -->
                        <button
                            class="btn btn-link text-decoration-none text-secondary">

                            💬 Comment

                        </button>

                    </div>
                `;

                // APPEND
                postsContainer.appendChild(postElement);
            });
        }

        // REMOVE IMAGE
        function removeImage() {

            selectedImage = null;

            mediaInput.value = '';

            preview.innerHTML = '';
        }

        // NAVIGATION
        function showPage(pageName) {

            if(pageName === 'home') {

                window.location.href =
                    `/home?username=${username}`;
            }

            if(pageName === 'profile') {

                window.location.href =
                    `/profile?username=${username}`;
            }
        }


                // CREATE POST
        function addNewPost() {

            const text =
                postInput.value.trim();

            // CHECK EMPTY
            if(text === '' && !selectedImage) {

                alert(
                    'Write something or add an image'
                );

                return;
            }

            // NEW POST
            const newPostObject = {

                id:
                    'post_' + Date.now(),

                author:
                    username,

                content:
                    text,

                image:
                    selectedImage,

                timestamp:
                    new Date().toISOString()
            };

            // PUSH
            savedPostsArray.push(
                newPostObject
            );

            // SAVE
            localStorage.setItem(
                'app_feed_posts',
                JSON.stringify(savedPostsArray)
            );

            // RE-RENDER
            renderAllSavedPosts();

            // RESET
            postInput.value = '';

            mediaInput.value = '';

            selectedImage = null;

            preview.innerHTML = '';
        }

        // IMAGE PREVIEW
        mediaInput.addEventListener(
            'change',
            (e) => {

                const file =
                    e.target.files[0];

                // NO FILE
                if(!file) return;

                const reader =
                    new FileReader();

                reader.onload =
                    function(event) {

                    selectedImage =
                        event.target.result;

                    // PREVIEW
                    preview.innerHTML = `

                        <div class="position-relative mt-2">

                            <img
                                src="${selectedImage}"
                                class="img-fluid rounded-3 w-100 object-fit-cover"
                                style="max-height:250px;"
                            >

                            <!-- REMOVE -->
                            <button
                                class="btn btn-danger position-absolute top-0 end-0 m-2 rounded-circle"
                                onclick="removeImage()">

                                ✖

                            </button>

                        </div>
                    `;
                };

                // READ FILE
                reader.readAsDataURL(file);
            }
        );

        // DELETE POST
        function deletePost(postId) {

            const confirmDelete =
                confirm("Delete this post?");

            if(!confirmDelete) return;

            savedPostsArray =
                savedPostsArray.filter(
                    post => post.id !== postId
                );

            localStorage.setItem(
                'app_feed_posts',
                JSON.stringify(savedPostsArray)
            );

            renderAllSavedPosts();
        }
        // PROFILE
        function goToProfile() {

            window.location.href =
                `/profile?username=${username}`;
        }

        // DARK MODE
        function toggleDarkMode() {

            document.body.classList.toggle(
                'dark-mode'
            );
        }

        // LOGOUT
        function logout() {

            const confirmLogout =
                confirm(
                    "Are you sure you want to logout?"
                );

            if(confirmLogout) {

                sessionStorage.clear();

                localStorage.removeItem(
                    'username'
                );

                window.location.replace(
                    "/login"
                );
            }
        }

        // MENU
        const menuBtn =
            document.getElementById('menu');

        const closeBtn =
            document.getElementById('close-menu');

        const dropdown =
            document.getElementById('dropdownMenu');

        // OPEN
        menuBtn.addEventListener(
            'click',
            (e) => {

                e.stopPropagation();

                menuBtn.classList.add(
                    'd-none'
                );

                closeBtn.classList.remove(
                    'd-none'
                );

                dropdown.classList.add(
                    'show'
                );
            }
        );

        // CLOSE
        closeBtn.addEventListener(
            'click',
            (e) => {

                e.stopPropagation();

                closeBtn.classList.add(
                    'd-none'
                );

                menuBtn.classList.remove(
                    'd-none'
                );

                dropdown.classList.remove(
                    'show'
                );
            }
        );

        // CLICK OUTSIDE
        document.addEventListener(
            'click',
            () => {

                closeBtn.classList.add(
                    'd-none'
                );

                menuBtn.classList.remove(
                    'd-none'
                );

                dropdown.classList.remove(
                    'show'
                );
            }
        );

    </script>

</body>
</html>
