<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Cache-Control"
        content="no-cache, no-store, must-revalidate">

    <meta http-equiv="Pragma"
        content="no-cache">

    <meta http-equiv="Expires"
        content="0">

    <title>Home</title>

    <link rel="shortcut icon"
        type="image/x-icon"
        href="/images/logo.jpeg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="/styles/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="w-100 d-flex justify-content-between align-items-center px-3 sticky-top">

        <!-- LOGO -->
        <div class="logo">

            <img
                src="/images/logo.jpeg"
                width="50"
                height="50"
                alt="Logo"
                class="rounded-3"
            >

        </div>

        <!-- MENU -->
        <div class="menu position-relative"
            style="cursor:pointer;">

            <!-- OPEN -->
            <svg id="menu"
                xmlns="http://www.w3.org/2000/svg"
                height="28px"
                viewBox="0 -960 960 960"
                width="28px">

                <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
            </svg>

            <!-- CLOSE -->
            <svg id="close-menu"
                class="d-none"
                xmlns="http://www.w3.org/2000/svg"
                height="28px"
                viewBox="0 -960 960 960"
                width="28px">

                <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/>
            </svg>

        </div>

        <!-- DROPDOWN -->
        <div
            class="dropdown-menu custom-dropdown flex-column gap-2 p-2 rounded-3 shadow-lg"
            id="dropdownMenu">

            <button
                id="darkModeToggle"
                class="btn btn-primary w-100 btn-sm"
                onclick="toggleDarkMode()">

                Dark Mode
            </button>

            <button
                    class="btn btn-danger w-100 btn-sm"
                    onclick="logout(event)">

                    Logout
                </button>
            <!-- LOGOUT MODAL -->
            <div id="logoutModal" class="logout-modal">

                <div class="logout-box">

                    <!-- TITLE -->
                    <h2 class="logout-title fs-4">
                        Do you want to log out?
                    </h2>

                    <!-- TEXT -->
                    <p class="logout-text">
                        Your current session will end.
                    </p>

                    <!-- BUTTONS -->
                    <div class="logout-buttons">

                        <!-- YES -->
                        <button
                            class="logout-yes"
                            onclick="confirmLogout()">
                            Yes
                        </button>
                        <!-- NO -->
                        <button
                            class="logout-no"
                            onclick="closeLogoutModal()">

                            No
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </header>

    <!-- MAIN -->
    <main
        class="container px-3 pt-3 pb-5"
        style="max-width:600px;"
        id="homePage">

        <!-- COMPOSER -->
        <div class="composer rounded-4 p-3 mb-3 shadow-sm">

            <div class="composer-top d-flex align-items-center gap-2">

                <!-- AVATAR -->
                <img
                    id="homeProfileAvatar"
                    class="rounded-circle object-fit-cover"
                    style="width:42px; height:42px;"
                >

                <!-- TEXTAREA -->
                <textarea
                    id="postInput"
                    class="form-control rounded-pill border-0 px-3 py-2 fs-6"
                    placeholder="Nag unsa ka?">
                </textarea>

            </div>

            <!-- IMAGE INPUT -->
            <input
                type="file"
                id="mediaInput"
                accept="image/*"
                class="d-none"
            >

            <!-- PREVIEW -->
            <div id="imagePreview"
                class="image-preview w-100">
            </div>

            <!-- ACTIONS -->
            <div class="composer-actions d-flex justify-content-between align-items-center mt-3">

                <!-- UPLOAD -->
                <button
                    class="btn btn-link text-decoration-none text-dark p-0 d-flex align-items-center gap-1 upload-btn shadow-none"
                    type="button"
                    onclick="document.getElementById('mediaInput').click()">

                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">
                        <path d="M480-480ZM200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h320v80H200v560h560v-320h80v320q0 33-23.5 56.5T760-120H200Zm40-160h480L570-480 450-320l-90-120-120 160Zm440-320v-80h-80v-80h80v-80h80v80h80v80h-80v80h-80Z"/>
                    </svg>
                    <span class="fs-6 fw-semibold">
                        Upload
                    </span>

                </button>

                <!-- POST -->
                <button
                    class="btn btn-dark rounded-pill px-4 fw-semibold post-btn"
                    onclick="addNewPost()">

                    Post
                </button>

            </div>

        </div>

        <!-- POSTS -->
        <div id="posts"
            class="w-100">
        </div>
    </main>

    <section
        id="searchPage"
        class="d-none container px-3 pt-3 pb-5"
        style="max-width:600px;">

        <div class="search-box p-3 rounded-4 shadow-sm">

            <input
                type="text"
                id="searchInput"
                class="form-control mb-2"
                placeholder="Search username..."
            >

            <!-- RESULTS -->
            <div id="searchResult" class="mt-3"></div>

        </div>

    </section>

    <!-- NAVIGATION -->
    <nav class="mobile-nav fixed-bottom mx-auto mb-3 bg-white bg-opacity-75 border d-flex align-items-center justify-content-around shadow rounded-pill">

        <!-- HOME -->
        <button
            class="rounded-circle border-0 bg-transparent d-flex justify-content-center align-items-center"
            style="width:48px; height:48px;"
            onclick="showPage('home')">

            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">
                <path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/>
            </svg>

        </button>

        <!-- SEARCH -->
        <button
            class="rounded-circle border-0 bg-transparent d-flex justify-content-center align-items-center"
            style="width:48px; height:48px;"
            onclick="showPage('search')">

            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">
                <path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
            </svg>

        </button>

        <!-- PROFILE -->
        <button
            class="rounded-circle border-0 bg-transparent d-flex justify-content-center align-items-center"
            style="width:48px; height:48px;"
            onclick="goToProfile()">

            <img
                id="navProfileAvatar"
                class="rounded-circle object-fit-cover"
                style="width:42px; height:42px;"
            >

        </button>

    </nav>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SCRIPT -->
    <script>

        // POSTS CONTAINER
        const postsContainer = document.getElementById('posts');

        // INPUT
        const postInput = document.getElementById('postInput');

        // IMAGE INPUT
        const mediaInput = document.getElementById('mediaInput');

        // PREVIEW
        const preview = document.getElementById('imagePreview');

        // SELECTED IMAGE
        let selectedImage = null;

        mediaInput.addEventListener('change', (e) => {
        const file = e.target.files[0];

            if (!file) return;

            // Check file type
            if (!file.type.startsWith("image/")) {
                alert("Please select a valid image file");
                mediaInput.value = "";
                return;
            }

            // Check file size (2MB limit)
            if (file.size > 2 * 1024 * 1024) {
                alert("Image too large! Max 2MB allowed.");
                mediaInput.value = "";
                return;
            }

            const reader = new FileReader();

            reader.onload = function (event) {
                selectedImage = event.target.result;
                console.log("Image loaded successfully"); // Debug

                preview.innerHTML = `
                    <div class="position-relative mt-2">
                        <img src="${selectedImage}"
                            class="img-fluid rounded-3 w-100 object-fit-cover"
                            style="max-height:250px;">
                        <button class="btn btn-danger position-absolute top-0 end-0 m-2 rounded-circle"
                            onclick="removeImage()">
                            ✖
                        </button>
                    </div>
                `;
            };

            reader.onerror = function() {
                console.log("Error reading file");
                alert("Error reading file");
            };

            reader.readAsDataURL(file);
        });
        // USERNAME
        const params = new URLSearchParams(window.location.search);

        const username = params.get('username') || "User";

        // DEFAULT IMAGE
        const defaultProfile = "/assets/images/profile.jpg";

        const savedProfileImage = localStorage.getItem(`profileImage_${username}`);

        const homeAvatar = document.getElementById('homeProfileAvatar');
        homeAvatar.src = savedProfileImage || defaultProfile;

        const navAvatar = document.getElementById('navProfileAvatar');
        navAvatar.src = savedProfileImage || defaultProfile;

        navAvatar.src = savedProfileImage || defaultProfile;

        document.addEventListener(
            "DOMContentLoaded",
            async () => {

                await loadUserProfileImages();

                fetchPosts();

                handleNavHideOnScroll();
            }
        );
        // PLACEHOLDER
        postInput.placeholder =
            username !== "User"
            ? `Nag unsa ka, ${username}?`
            : "Nag unsa ka?";

        // POSTS STORAGE
        let savedPostsArray =
            JSON.parse(
                localStorage.getItem('app_feed_posts')
            ) || [];

        async function loadNavbarProfile() {
            try {
                const res = await fetch(`/profile-data?username=${username}`);
                const user = await res.json();

                const avatar = user.profile_pic || "/assets/images/profile.jpg";

                document.getElementById('navProfileAvatar').src = avatar;

            } catch (err) {
                console.log(err);
            }
        }

        // TIME FORMAT
        function formatTimestamp(timestamp) {

            const now = new Date();

            const diffInSeconds =
                Math.floor(
                    (now - new Date(timestamp)) / 1000
                );

            if(diffInSeconds < 60)
                return 'just now';

            const diffInMinutes =
                Math.floor(diffInSeconds / 60);

            if(diffInMinutes < 60)
                return `${diffInMinutes}m`;

            const diffInHours =
                Math.floor(diffInMinutes / 60);

            if(diffInHours < 24)
                return `${diffInHours}h`;

            const diffInDays =
                Math.floor(diffInHours / 24);

            return `${diffInDays}d`;
        }
        
        // LOAD PROFILE IMAGES
        async function loadUserProfileImages() {

            try {

                const response =
                    await fetch(`/profile-data?username=${username}`);

                const user = await response.json();

                const avatar =
                    user.profile_pic || defaultProfile;

                document.getElementById('homeProfileAvatar').src = avatar;

                document.getElementById('navProfileAvatar').src = avatar;

            } catch(error) {

                console.log(error);
            }
        }

        async function fetchPosts() {
            try {
                const response = await fetch('/posts');
                const postsData = await response.json();
                
                if(postsData.error) {
                    console.log(postsData.error);
                    return;
                }
                
                renderAllSavedPosts(postsData); // Pass data to render function
            } catch (error) {
                console.log("Error fetching posts:", error);
            }
        }

        // RENDER POSTS
        function renderAllSavedPosts(postArray) {

            postsContainer.innerHTML = '';

            postArray.reverse().forEach(postData => {

                const currentProfileImage =
                    postData.profile_pic || defaultProfile;

                const postElement = document.createElement('div');

                postElement.className =
                    'post rounded-4 p-3 mb-3 shadow-sm border-0';

                postElement.innerHTML = `
                    <div class="d-flex align-items-center gap-2 mb-2">

                        <img
                            src="${currentProfileImage}"
                            class="rounded-circle object-fit-cover"
                            style="width:42px; height:42px;"
                        >

                        <div>
                            <div class="fw-semibold">
                                ${postData.username}
                            </div>

                            <div class="small text-muted">
                                ${formatTimestamp(postData.timestamp)}
                            </div>
                        </div>

                    </div>

                    <div class="post-text mt-2">
                        ${postData.content || ''}
                    </div>

                    ${postData.image ? `
                        <img
                            src="${postData.image}"
                            class="img-fluid rounded-3 mt-2 w-100"
                            style="max-height:400px; object-fit:cover;"
                        >
                    ` : ''}

                    
                `;

                postsContainer.appendChild(postElement);
            });
        }

        function openSearchPage() {
    document.getElementById('homePage').classList.add('d-none');
    document.getElementById('searchPage').classList.remove('d-none');

    document.getElementById('searchInput').focus();
}

        // REMOVE IMAGE
        function removeImage() {
            selectedImage = null;
            mediaInput.value = "";
            preview.innerHTML = "";
        }

        function showPage(pageName) {

            const home = document.getElementById('homePage');
            const search = document.getElementById('searchPage');

            if (pageName === 'home') {
                home.classList.remove('d-none');
                search.classList.add('d-none');
            }

            if (pageName === 'search') {
                home.classList.add('d-none');
                search.classList.remove('d-none');
            }

            if (pageName === 'profile') {
                window.location.href = `/profile?username=${username}`;
            }
        }
        
        // NAV HIDE ON SCROLL
        function handleNavHideOnScroll() {
            let lastScrollTop = 0;
            const nav = document.querySelector('.mobile-nav');

            window.addEventListener('scroll', () => {

                let currentScroll =
                    window.pageYOffset || document.documentElement.scrollTop;

                if (currentScroll > lastScrollTop) {

                    // scrolling down → hide nav
                    nav.classList.add('hide');

                } else {

                    // scrolling up → show nav
                    nav.classList.remove('hide');
                }

                lastScrollTop =
                    currentScroll <= 0 ? 0 : currentScroll;
            });
        }

        document.addEventListener(
            'DOMContentLoaded',
            handleNavHideOnScroll
        );

        // CREATE POST
        async function addNewPost() {

            const text = postInput.value.trim();

            if (text === '' && !selectedImage) {
                alert('Write something or add an image');
                return;
            }

            try {

                const response = await fetch('/add-post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        content: text,
                        image: selectedImage
                    })
                });

                const result = await response.json();

                if(result.error) {
                    alert(result.error);
                    return;
                }

                // reload posts
                fetchPosts();

                // reset fields
                postInput.value = '';
                mediaInput.value = '';
                selectedImage = null;
                preview.innerHTML = '';

            } catch(error) {

                console.log(error);
                alert("Failed to add post");
            }
        }
        document.getElementById('searchInput').addEventListener('input', searchUser);        

        // TOGGLE LIKE
        async function toggleLike(postId) {
            try {
                const response = await fetch('/like-post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        postId: postId
                    })
                });

                const result = await response.json();

                if(result.error) {
                    alert(result.error);
                    return;
                }
                fetchPosts();
            } catch(error) {

                console.log(error);
                alert("Failed to like post");
            }
        }

        //SEARCH FUNCTION
        async function searchUser() {

            const input =
                document.getElementById('searchInput')
                .value
                .trim();

            const resultBox = document.getElementById('searchResult');

            // EMPTY INPUT
            if (!input) {
                resultBox.innerHTML =
                    `<p class="text-muted">Type a username</p>`;

                return;
            }

            try {
                const response = await fetch(`/search-users?keyword=${input}`);

                const users = await response.json();

                // NO RESULTS
                if (users.length === 0) {
                    resultBox.innerHTML =
                        `<p class="text-danger">No users found</p>`;
                    return;
                }

                // CLEAR
                resultBox.innerHTML = '';

                users.forEach(user => {
                    resultBox.innerHTML += `

                        <div class="p-2 border rounded-3 d-flex align-items-center justify-content-between mb-2">

                            <span class="fw-semibold">
                                ${user.username}
                            </span>

                            <button
                                class="btn btn-primary btn-sm"
                                onclick="goToUserProfile('${user.username}')">

                                View

                            </button>

                        </div>
                    `;
                });

            } catch (error) {
                console.log(error);
                resultBox.innerHTML =
                    `<p class="text-danger">Search failed</p>`;
            }
        }

        function goToUserProfile(username) {
            window.location.href = `/profile?username=${username}`;
        }

        function toggleDeleteBox(postId) {
            const box = document.getElementById(`deleteBox_${postId}`);
            box.classList.toggle('d-none');
        }

        function toggleDeleteBox(postId) {
            const box = document.getElementById(`deleteBox_${postId}`);
            box.classList.toggle('d-none');
        }

        // DELETE POST
        async function deletePost(postId) {
            try {

                const response = await fetch('/delete-post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        id: postId,
                        username: username
                    })
                });

                const result = await response.json();

                if(result.error) {
                    alert(result.error);
                    return;
                }

                fetchPosts();

            } catch(error) {

                console.log(error);
                alert("Failed to delete post");
            }
        }
        // PROFILE
        function goToProfile() {

            window.location.href =
                `/profile?username=${username}`;
        }

        // DARK MODE
        function toggleDarkMode() {

            document.body.classList.toggle(
                'dark-mode'
            );
        }

        // LOGOUT
        function logout(event) {

            if(event) {
                event.stopPropagation();
            }
            document.getElementById('logoutModal').style.display = 'flex';
        }
        // CLOSE MODAL
        function closeLogoutModal() {
            document.getElementById('logoutModal').style.display = 'none';
        }

        // CONFIRM LOGOUT
        function confirmLogout() {
            sessionStorage.clear();
            localStorage.removeItem('username');
            window.location.replace('/login');
        }

        // MENU
        const menuBtn = document.getElementById('menu');
        const closeBtn = document.getElementById('close-menu');
        const dropdown = document.getElementById('dropdownMenu');

        // OPEN
        menuBtn.addEventListener(
            'click',
            (e) => {

                e.stopPropagation();

                menuBtn.classList.add(
                    'd-none'
                );

                closeBtn.classList.remove(
                    'd-none'
                );

                dropdown.classList.add(
                    'show'
                );
            }
        );

        // CLOSE
        closeBtn.addEventListener(
            'click',
            (e) => {

                e.stopPropagation();

                closeBtn.classList.add(
                    'd-none'
                );

                menuBtn.classList.remove(
                    'd-none'
                );

                dropdown.classList.remove(
                    'show'
                );
            }
        );

        // CLICK OUTSIDE
        document.addEventListener(
            'click',
            () => {

                closeBtn.classList.add(
                    'd-none'
                );

                menuBtn.classList.remove(
                    'd-none'
                );

                dropdown.classList.remove(
                    'show'
                );
            }
        );

    </script>

</body>
</html>
