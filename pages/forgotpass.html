<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/x-icon" href="/images/logo.jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/style.css">
    <title>Forgot Password</title>

</head>

<body>

    <section class="login-card">

        <div class="header text-center d-flex flex-column justify-content-center">
            <h2>Reset Password</h2>
            <p class="text-muted fs-6">Enter your email and new password</p>
        </div>

        <div class="login-form gap-3 w-100 p-4">
            <form id="reset-form">
                <!-- get the email -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input 
                        id="email"
                        name="email"
                        type="email"
                        class="form-control"
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <!-- enter password -->
                <div class="mb-3">
                    <label class="form-label">New Password</label>

                    <div class="pass-container">
                        <input 
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter your new password"
                            required
                        >

                        <!-- SHOW PASSWORD -->
                        <svg id="show-password"
                            xmlns="http://www.w3.org/2000/svg"
                            height="24px"
                            viewBox="0 -960 960 960"
                            width="24px"
                            fill="#000"
                            onclick="togglePass()">
                            <path d="M480-320q75 0 127.5-52.5T660-500q0-75-52.5-127.5T480-680q-75 0-127.5 52.5T300-500q0 75 52.5 127.5T480-320Zm0-72q-45 0-76.5-31.5T372-500q0-45 31.5-76.5T480-608q45 0 76.5 31.5T588-500q0 45-31.5 76.5T480-392Zm0 192q-146 0-266-81.5T40-500q54-137 174-218.5T480-800q146 0 266 81.5T920-500q-54 137-174 218.5T480-200Z"/>
                        </svg>

                        <!-- HIDE PASSWORD -->
                        <svg id="hide-password"
                            xmlns="http://www.w3.org/2000/svg"
                            height="24px"
                            viewBox="0 -960 960 960"
                            width="24px"
                            fill="#000"
                            onclick="togglePass()">
                            <path d="m644-428-58-58q9-47-27-88t-93-32l-58-58Zm148 148-58-58q38-29 67.5-63.5T844-500q-50-94-139-147t-193-53q-41 0-81 8.5T353-666l-58-58q43-20 89-32t96-12q146 0 266 81.5T920-500q-17 43-43 82.5T792-280ZM792-56 56-792l56-56 736 736-56 56Z"/>
                        </svg>

                    </div>
                </div>


                <!-- BUTTON -->
                <button type="submit" class="btn btn-primary w-100" onclick="saveThis()">Save</button>
                

                <div id="done-overlay">
                    <div id="done">
                        <p class="fw-bold fs-4 text-success">You password has been changed</p>
                        <p class="fs-6 text-muted">Please don't forget your password next time.</p>
                        <button type="submit" class="btn btn-primary ">
                            <a href="/login" class="text-decoration-none text-success">Back to login</a>
                         </button>
                    </div>
                </div>

            </form>
            <div class="login-or-register">
                <p class="text-center"><span>or</span></p>
            </div>
            

            <p class="text-center mb-0">Back to
                <a href="login" class="text-decoration-none">Login</a>
            </p>
        </div>
    </section>

    <script>
        function togglePass(){
            const password = document.getElementById('password');
            const showPassword = document.getElementById('show-password');
            const hidePassword = document.getElementById('hide-password');
            
            if(password.type === "password"){
                password.type = "text";

                showPassword.style.display = "none";
                hidePassword.style.display = "block";
            }
            else{
                password.type = "password";

                showPassword.style.display = "block";
                hidePassword.style.display = "none";
            }
            
        }

        function saveThis()
        {
            const form = document.getElementById('reset-form');
            const doneOverlay = document.getElementById('done-overlay');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const response = await fetch('/forgotpass', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        email,
                        password
                    })
                });

                const result = await response.text();

                if(result === "Password Updated"){
                    doneOverlay.style.display = "flex";
                }
                else{
                    alert(result);
                }
            });
        }
    </script>
</body>
</html>
