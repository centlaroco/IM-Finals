<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/x-icon" href="/images/logo.jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/style.css">
    <title>Login</title>
</head>

<body>

    <section class="login-card">

        <div class="header text-center d-flex flex-column justify-content-center">
            <h2>Login</h2>
            <p class="text-muted">
                You must login into your account to continue
            </p>
        </div>

        <div class="login-form gap-3 w-100 p-4">

            <form method="POST" action="/login">

                <div class="mb-3">
                    <label class="form-label">Username</label>

                    <input 
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter your username"
                        required
                    >
                </div>

                <div class="mb-3">

                    <label class="form-label">Password</label>

                    <div class="pass-container position-relative">

                        <input 
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter your password"
                            required
                        >
                        <svg 
                            id="show-password"
                            xmlns="http://www.w3.org/2000/svg"
                            height="24px"
                            viewBox="0 -960 960 960"
                            width="24px"
                            fill="#000"
                            onclick="togglePass()"
                            style="
                                position: absolute;
                                right: 12px;
                                top: 50%;
                                transform: translateY(-50%);
                                cursor: pointer;
                                z-index: 5; /* Keeps icon clickable over background states */
                            "
                        >
                            <path d="M480-320q75 0 127.5-52.5T660-500q0-75-52.5-127.5T480-680q-75 0-127.5 52.5T300-500q0 75 52.5 127.5T480-320Zm0-72q-45 0-76.5-31.5T372-500q0-45 31.5-76.5T480-608q45 0 76.5 31.5T588-500q0 45-31.5 76.5T480-392Zm0 192q-146 0-266-81.5T40-500q54-137 174-218.5T480-800q146 0 266 81.5T920-500q-54 137-174 218.5T480-200Z"/>
                        </svg>

                        <svg 
                            id="hide-password"
                            xmlns="http://www.w3.org/2000/svg"
                            height="24px"
                            viewBox="0 -960 960 960"
                            width="24px"
                            fill="#000"
                            onclick="togglePass()"
                            style="
                                position: absolute;
                                right: 12px;
                                top: 50%;
                                transform: translateY(-50%);
                                cursor: pointer;
                                display: none;
                                z-index: 5;
                            "
                        >
                            <path d="m644-428-58-58q9-47-27-88t-93-32l-58-58Zm148 148-58-58q38-29 67.5-63.5T844-500q-50-94-139-147t-193-53q-41 0-81 8.5T353-666l-58-58q43-20 89-32t96-12q146 0 266 81.5T920-500q-17 43-43 82.5T792-280ZM792-56 56-792l56-56 736 736-56 56Z"/>
                        </svg>

                    </div>
                    
                    <div id="error-message" class="invalid-feedback mt-1" style="display: none;">
                        Wrong password.
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3 gap-2">
                    <div class="form-check">

                        <input 
                            class="form-check-input"
                            type="checkbox"
                            id="remember"
                        >

                        <label 
                            class="form-check-input-label"
                            for="remember"
                        >
                            Remember me
                        </label>
                    </div>
                    <a href="/forgotpass" class="text-decoration-none">
                        Forgot Password?
                    </a>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    Login
                </button>

            </form>

            <div class="login-or-register text-center my-3">
                <span>or</span>
            </div>

            <p class="text-center mb-0">
                Not registered?

                <a href="/signup" class="text-decoration-none">
                    Register
                </a>
            </p>

        </div>

    </section>

    <script>
        // Check URL parameters on page load
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === '1') {
                const passwordInput = document.getElementById('password');
                const errorMessage = document.getElementById('error-message');
                
                // Add Bootstrap's input error utility (gives red border and subtle glow if customized)
                passwordInput.classList.add('is-invalid');
                
                // Force input background color change to a light red tint
                passwordInput.style.backgroundColor = '#f8d7da'; 
                
                // Show text
                errorMessage.style.display = 'block';
            }
        });

        function togglePass() {
            const password = document.getElementById('password');
            const showPassword = document.getElementById('show-password');
            const hidePassword = document.getElementById('hide-password');

            if(password.type === "password") {
                password.type = "text";
                showPassword.style.display = "none";
                hidePassword.style.display = "block";
            } 
            else {
                password.type = "password";
                showPassword.style.display = "block";
                hidePassword.style.display = "none";
            }
        }
    </script>

</body>
</html>
